name: Playwright Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  stable-quality:
    name: Stable quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run static quality checks
        run: npm run quality

      - name: Run stable Playwright tests
        run: |
          npm run test:home
          npm run test:developments
          npm run test:access

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  link-audit:
    name: Link audit report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run link audit
        run: npm run test:audit

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload audit Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  known-site-issues:
    name: Known site issues
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run contact checks
        continue-on-error: true
        run: npm run test:contact

      - name: Run broker access checks
        continue-on-error: true
        run: npm run test:broker

      - name: Run WordPress hygiene checks
        continue-on-error: true
        run: npm run test:hygiene

      - name: Upload known issue artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: known-site-issue-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
